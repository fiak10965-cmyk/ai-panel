<script>

const API="/api/stats"

/* ================= LOAD ================= */

async function load(){

try{

const res=await fetch(API)
const data=await res.json()

/* STATS */

document.getElementById("totalsignal").innerText=data.total
document.getElementById("win").innerText=data.win
document.getElementById("loss").innerText=data.loss
document.getElementById("winstreak").innerText=data.winStreak
document.getElementById("lossstreak").innerText=data.lossStreak
document.getElementById("maxwinstreak").innerText=data.maxWinStreak
document.getElementById("maxlossstreak").innerText=data.maxLossStreak
document.getElementById("accuracy").innerText=data.accuracy+"%"

/* HISTORY TABLE */

let table=document.getElementById("history")
table.innerHTML=`
<tr>
<th>Period</th>
<th>Signal</th>
<th>Actual</th>
</tr>
`

data.history.forEach(r=>{
table.innerHTML+=`
<tr>
<td>${r.period}</td>
<td>${r.result}</td>
<td>${r.actual}</td>
</tr>`
})

/* LAST SIGNAL */

if(data.history.length){

let last=data.history[0]

document.getElementById("signal").innerText=last.result
document.getElementById("signal").style.color=last.result==="BIG"?"#22c55e":"#ef4444"

document.getElementById("num").innerText="-"
document.getElementById("color").innerText="-"

document.getElementById("confidence").innerText="90%"

/* RESULT */

if(last.result === last.actual){
document.getElementById("signalresult").innerText="WIN"
document.getElementById("signalresult").style.color="#22c55e"
}else{
document.getElementById("signalresult").innerText="LOSS"
document.getElementById("signalresult").style.color="#ef4444"
}

}

/* PERIOD (fake next) */

document.getElementById("period").innerText="AUTO"

}catch(e){
console.log("API ERROR")
}

}

/* LOOP */

setInterval(load,5000)
load()

/* TIMER */

function getRealSeconds(){
let now=new Date()
return 30-(now.getSeconds()%30)
}

setInterval(()=>{
let t=getRealSeconds()
let percent=(t/30)*100

document.getElementById("timer").innerText=t
document.getElementById("timerRing").style.setProperty("--p",percent)
},1000)

/* DOWNLOAD (from backend) */

async function downloadHistory(){

const res=await fetch("/api/stats")
const data=await res.json()

let csv="Period,Signal,Actual\n"

data.history.forEach(r=>{
csv+=`${r.period},${r.result},${r.actual}\n`
})

let blob=new Blob([csv],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="AI_PANEL_HISTORY.csv"
a.click()
}

</script>
